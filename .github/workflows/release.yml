name: release

# Tag-triggered release build. Pushing a `v*` tag kicks the workflow,
# which builds the full Tauri bundle on macOS + Linux and attaches the
# produced artefacts (.dmg on macOS, .deb / .AppImage on Linux) to a
# GitHub Release.
#
# Code signing + notarization are deliberately not wired here yet —
# they need an Apple Developer cert and secrets the repo owner has to
# add manually. See PLAN.md Phase E for the checklist.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust-target: aarch64-apple-darwin
          - os: macos-13
            rust-target: x86_64-apple-darwin
          - os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Linux build prerequisites
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            pkg-config \
            libssl-dev

      - name: Install JS deps
        run: bun install

      - name: Build
        # We don't set CARGO_BUILD_TARGET here because each runner's host
        # triple already matches its matrix entry (macos-latest=aarch64,
        # macos-13=x86_64, ubuntu-latest=x86_64). Setting it would send
        # artefacts to target/<triple>/release/ and break both bundle-
        # sidecars and the "Collect artefacts" find paths below.
        run: bun run tauri build

      - name: Collect macOS artefacts
        if: startsWith(matrix.os, 'macos')
        run: |
          mkdir -p artefacts
          find src-tauri/target/release/bundle/dmg -name "*.dmg" -exec cp {} artefacts/ \;
          find src-tauri/target/release/bundle/macos -name "*.app" -maxdepth 2 -exec sh -c '
            cd "$(dirname "$1")"
            zip -r -q "$(basename "$1").zip" "$(basename "$1")"
            mv "$(basename "$1").zip" "$OLDPWD/artefacts/"
          ' sh {} \;

      - name: Collect Linux artefacts
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          mkdir -p artefacts
          find src-tauri/target/release/bundle/deb -name "*.deb" -exec cp {} artefacts/ \;
          find src-tauri/target/release/bundle/appimage -name "*.AppImage" -exec cp {} artefacts/ \;

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: artefacts/*
          generate_release_notes: true
